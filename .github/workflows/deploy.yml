name: Deploy NestJS Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image reference
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=${{ env.REGISTRY }}/${REPO_LC}:${{ github.sha }}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${{ env.REGISTRY }}/${REPO_LC}:latest" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_LATEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Download production env from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "DOPPLER_TOKEN not set — VPS will keep existing .env"
            exit 0
          fi
          doppler secrets download --no-file --format env > production.env
          echo "Downloaded $(wc -l < production.env) lines from Doppler"
          echo "has_production_env=true" >> "$GITHUB_ENV"

      - name: Upload production env to VPS
        if: env.has_production_env == 'true'
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: production.env
          target: /home/ngoc_anh/messenger-bot/
          timeout: 60s

      - name: Upload compose file to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: /home/ngoc_anh/messenger-bot/
          timeout: 60s

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.IMAGE }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: IMAGE,GHCR_PULL_TOKEN,GHCR_USER
          script: |
            set -euo pipefail

            DEPLOY_PATH="/home/ngoc_anh/messenger-bot"
            PORT=5007

            read_port_from_env() {
              local env_file="$1"
              local env_port
              if [ -f "$env_file" ]; then
                env_port=$(grep -E '^PORT=' "$env_file" | tail -1 | cut -d= -f2- | tr -d '\r')
                env_port="${env_port%\"}"
                env_port="${env_port#\"}"
                env_port="${env_port%\'}"
                env_port="${env_port#\'}"
                if [ -n "$env_port" ]; then
                  PORT="$env_port"
                fi
              fi
            }

            ensure_production_env_vars() {
              local env_file="$1"
              if [ ! -f "$env_file" ]; then
                return 0
              fi

              set_env_var() {
                local key="$1"
                local value="$2"
                if grep -q "^${key}=" "$env_file"; then
                  sed -i "s/^${key}=.*/${key}=${value}/" "$env_file"
                else
                  printf '\n%s=%s\n' "$key" "$value" >> "$env_file"
                fi
              }

              set_env_var CHAT_RATE_LIMIT_ENABLED true
              set_env_var ENFORCE_PROD_CHAT_QUOTA true
              set_env_var DOPPLER_RUNTIME_SYNC_ENABLED true
              set_env_var DEPLOY_DIR /deploy
              set_env_var DEPLOY_ENV_FILE /deploy/.env
              set_env_var DEPLOY_COMPOSE_FILE /deploy/docker-compose.prod.yml
              set_env_var DOCKER_GID "$(stat -c '%g' /var/run/docker.sock)"
              echo "Ensured production env flags and deploy paths in .env"
            }

            apply_doppler_env_from_ci() {
              if [ ! -f "$DEPLOY_PATH/production.env" ]; then
                return 0
              fi

              install -m 600 "$DEPLOY_PATH/production.env" "$DEPLOY_PATH/.env"
              rm -f "$DEPLOY_PATH/production.env"
              echo "Applied .env from Doppler (CI)"
            }

            health_check() {
              local attempt
              for attempt in $(seq 1 30); do
                if curl -sf "http://127.0.0.1:${PORT}/health/db" >/dev/null; then
                  echo "Health check passed on attempt ${attempt}"
                  return 0
                fi
                sleep 2
              done
              return 1
            }

            if ! command -v docker >/dev/null 2>&1; then
              echo "ERROR: docker is not installed on VPS"
              exit 1
            fi

            if docker info >/dev/null 2>&1; then
              DOCKER="docker"
            elif sudo docker info >/dev/null 2>&1; then
              DOCKER="sudo docker"
              echo "Using sudo for docker (user not in docker group)"
            else
              echo "ERROR: cannot access docker API (try: sudo usermod -aG docker $USER)"
              exit 1
            fi

            cd "$DEPLOY_PATH"
            apply_doppler_env_from_ci

            if [ ! -f .env ]; then
              if [ -f publish/.env ]; then
                cp publish/.env .env
                echo "Migrated .env from legacy publish/ path"
              else
                echo "ERROR: No .env found under $DEPLOY_PATH"
                exit 1
              fi
            fi

            ensure_production_env_vars .env
            read_port_from_env .env
            echo "Listening port: $PORT"

            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | $DOCKER login ghcr.io -u "$GHCR_USER" --password-stdin
            else
              echo "WARNING: GHCR_PULL_TOKEN not set — pull may fail for private images"
            fi

            export IMAGE
            export PORT

            echo "Pulling image: $IMAGE"
            $DOCKER compose -f docker-compose.prod.yml pull

            echo "Stopping legacy PM2 process (if any)"
            if command -v pm2 >/dev/null 2>&1; then
              pm2 delete messenger-bot >/dev/null 2>&1 || true
            fi

            echo "Starting container"
            $DOCKER compose -f docker-compose.prod.yml up -d --remove-orphans

            $DOCKER compose -f docker-compose.prod.yml ps
            $DOCKER logs messenger-bot --tail 40 || true

            if health_check; then
              echo "Deployment complete — container messenger-bot is healthy"
            else
              echo "ERROR: Health check failed"
              $DOCKER logs messenger-bot --tail 80 || true
              exit 1
            fi
