name: Deploy NestJS Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_build:
        description: Force Docker image rebuild (lint, test, build)
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'test/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'package.json'
              - 'package-lock.json'
              - 'nest-cli.json'
              - 'tsconfig*.json'
            deploy:
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/sync-env.yml'
              - '.github/scripts/**'

  quality:
    needs: changes
    if: |
      needs.changes.outputs.app == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.force_build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build application
        run: npm run build

  build-image:
    needs: [changes, quality]
    if: |
      always() &&
      !cancelled() &&
      (needs.changes.outputs.app == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.force_build)) &&
      needs.quality.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image: ${{ steps.prep.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image reference
        id: prep
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${REPO_LC}:${{ github.sha }}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${{ env.REGISTRY }}/${REPO_LC}:latest" >> "$GITHUB_ENV"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_LATEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [changes, quality, build-image]
    if: |
      always() &&
      !cancelled() &&
      (needs.changes.outputs.app == 'true' ||
        needs.changes.outputs.deploy == 'true' ||
        github.event_name == 'workflow_dispatch') &&
      (needs.quality.result == 'success' || needs.quality.result == 'skipped') &&
      (needs.build-image.result == 'success' || needs.build-image.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deploy image
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ needs.build-image.result }}" = "success" ]; then
            echo "IMAGE=${{ env.REGISTRY }}/${REPO_LC}:${{ github.sha }}" >> "$GITHUB_ENV"
            echo "DEPLOY_MODE=new-build" >> "$GITHUB_ENV"
          else
            echo "IMAGE=${{ env.REGISTRY }}/${REPO_LC}:latest" >> "$GITHUB_ENV"
            echo "DEPLOY_MODE=reuse-latest" >> "$GITHUB_ENV"
          fi

      - name: Trigger VPS deploy (HTTP)
        env:
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          VPS_PUBLIC_URL: ${{ vars.VPS_PUBLIC_URL }}
          IMAGE: ${{ env.IMAGE }}
          FORCE_RECREATE: 'false'
        run: bash .github/scripts/trigger-vps-deploy.sh
