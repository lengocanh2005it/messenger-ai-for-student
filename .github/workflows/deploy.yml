name: Deploy NestJS Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Prune to production dependencies
        run: npm ci --omit=dev

      - name: Create deployment archive
        run: |
          zip -rq messenger-bot-publish.zip \
            dist package.json package-lock.json node_modules ecosystem.config.cjs
          du -h messenger-bot-publish.zip

      - name: Upload archive to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: messenger-bot-publish.zip
          target: /home/ngoc_anh/messenger-bot/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            APP_NAME="messenger-bot"
            DEPLOY_PATH="/home/ngoc_anh/messenger-bot"
            PUBLISH_PATH="$DEPLOY_PATH/publish"
            STAGING_PATH="$DEPLOY_PATH/publish.next"
            PREV_PATH="$DEPLOY_PATH/publish.prev"
            PORT=5007

            load_shell() {
              # Non-interactive SSH + set -u breaks typical .bashrc (PS1, etc.)
              set +u
              [ -f /etc/profile ] && . /etc/profile >/dev/null 2>&1 || true
              [ -f ~/.profile ] && . ~/.profile >/dev/null 2>&1 || true
              [ -f ~/.bashrc ] && . ~/.bashrc >/dev/null 2>&1 || true
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
              set -u
            }

            resolve_node() {
              if command -v node >/dev/null 2>&1; then
                command -v node
              elif [ -x /usr/bin/node ]; then
                echo /usr/bin/node
              elif [ -x /usr/local/bin/node ]; then
                echo /usr/local/bin/node
              else
                find /usr /opt /home/ngoc_anh -name node -type f 2>/dev/null | grep -E 'bin/node$' | head -1
              fi
            }

            ensure_pm2() {
              if command -v pm2 >/dev/null 2>&1; then
                echo "PM2: $(pm2 -v)"
                return 0
              fi

              echo "PM2 not found — installing globally..."
              npm install -g pm2
              command -v pm2 >/dev/null 2>&1
            }

            setup_pm2_startup() {
              local user home service_unit
              user="$(whoami)"
              home="$HOME"
              service_unit="/etc/systemd/system/pm2-${user}.service"

              if [ -f "$service_unit" ]; then
                echo "PM2 systemd startup already configured: pm2-${user}"
                return 0
              fi

              if command -v systemctl >/dev/null 2>&1 && \
                 systemctl list-unit-files "pm2-${user}.service" 2>/dev/null | grep -q "pm2-${user}.service"; then
                echo "PM2 systemd unit already enabled: pm2-${user}"
                return 0
              fi

              echo "⚠️ WARNING: PM2 systemd service is not configured for user ${user}."
              echo "To ensure PM2 starts automatically on server reboot, run this manually ONCE on your VPS:"
              echo "  pm2 startup"
              echo "  (then copy & paste the 'sudo' command generated by that output)"
              echo "  pm2 save"
            }

            read_port_from_env() {
              local env_file="$1"
              local env_port
              if [ -f "$env_file" ]; then
                env_port=$(grep -E '^PORT=' "$env_file" | tail -1 | cut -d= -f2- | tr -d '\r')
                env_port="${env_port%\"}"
                env_port="${env_port#\"}"
                env_port="${env_port%\'}"
                env_port="${env_port#\'}"
                if [ -n "$env_port" ]; then
                  PORT="$env_port"
                fi
              fi
            }

            stop_app() {
              pm2 delete "$APP_NAME" >/dev/null 2>&1 || true

              local pid
              pid=$(lsof -ti:"$PORT" 2>/dev/null || true)
              if [ -n "$pid" ]; then
                kill -TERM "$pid" 2>/dev/null || true
                sleep 2
                if ps -p "$pid" >/dev/null 2>&1; then
                  kill -9 "$pid" 2>/dev/null || true
                fi
              fi
            }

            start_app() {
              cd "$PUBLISH_PATH"
              mkdir -p logs
              pm2 startOrReload ecosystem.config.cjs --update-env
            }

            health_check() {
              local attempt
              for attempt in $(seq 1 30); do
                if curl -sf "http://127.0.0.1:${PORT}/health/db" >/dev/null; then
                  echo "Health check passed on attempt ${attempt}"
                  return 0
                fi
                sleep 2
              done
              return 1
            }

            show_logs() {
              pm2 logs "$APP_NAME" --nostream --lines 40 || true
            }

            rollback() {
              echo "Rolling back to previous release..."
              stop_app
              rm -rf "$PUBLISH_PATH"
              if [ -d "$PREV_PATH" ]; then
                mv "$PREV_PATH" "$PUBLISH_PATH"
                start_app
              else
                echo "No previous release to restore"
              fi
            }

            restore_env_file() {
              local target_dir="$1"
              if [ -f "$DEPLOY_PATH/.env.backup" ]; then
                mv "$DEPLOY_PATH/.env.backup" "$target_dir/.env"
              elif [ -f "$DEPLOY_PATH/.env" ]; then
                cp "$DEPLOY_PATH/.env" "$target_dir/.env"
              elif [ -f "$PUBLISH_PATH/.env" ]; then
                cp "$PUBLISH_PATH/.env" "$target_dir/.env"
              else
                echo "WARNING: No .env found under $DEPLOY_PATH"
              fi
            }

            ensure_production_env_vars() {
              local env_file="$1/.env"
              if [ ! -f "$env_file" ]; then
                return 0
              fi

              set_env_var() {
                local key="$1"
                local value="$2"
                if grep -q "^${key}=" "$env_file"; then
                  sed -i "s/^${key}=.*/${key}=${value}/" "$env_file"
                else
                  printf '\n%s=%s\n' "$key" "$value" >> "$env_file"
                fi
              }

              set_env_var CHAT_RATE_LIMIT_ENABLED true
              set_env_var ENFORCE_PROD_CHAT_QUOTA true
              echo "Ensured CHAT_RATE_LIMIT_ENABLED and ENFORCE_PROD_CHAT_QUOTA in .env"
            }

            load_shell
            NODE_EXEC="$(resolve_node)"
            if [ -z "$NODE_EXEC" ] || [ ! -x "$NODE_EXEC" ]; then
              echo "ERROR: node executable not found"
              exit 1
            fi
            echo "Using node: $NODE_EXEC ($("$NODE_EXEC" -v))"

            ensure_pm2

            cd "$DEPLOY_PATH"
            if [ ! -f messenger-bot-publish.zip ]; then
              echo "ERROR: messenger-bot-publish.zip not found"
              ls -la
              exit 1
            fi
            echo "Archive size: $(du -h messenger-bot-publish.zip | cut -f1)"

            if [ -f "$PUBLISH_PATH/.env" ]; then
              cp "$PUBLISH_PATH/.env" "$DEPLOY_PATH/.env.backup"
            fi

            echo "------ Extract staging release ------"
            rm -rf "$STAGING_PATH"
            mkdir -p "$STAGING_PATH"
            unzip -oq messenger-bot-publish.zip -d "$STAGING_PATH"
            rm -f messenger-bot-publish.zip
            restore_env_file "$STAGING_PATH"
            ensure_production_env_vars "$STAGING_PATH"
            read_port_from_env "$STAGING_PATH/.env"
            echo "Listening port: $PORT"

            echo "------ Run database migrations ------"
            cd "$STAGING_PATH"
            if [ -f .env ]; then
              "$NODE_EXEC" --env-file=.env ./node_modules/typeorm/cli.js \
                migration:run \
                -d dist/infrastructure/database/data-source.js
            else
              echo "WARNING: Skipping migrations because .env is missing"
            fi

            echo "------ Swap releases ------"
            stop_app
            rm -rf "$PREV_PATH"
            if [ -d "$PUBLISH_PATH" ]; then
              mv "$PUBLISH_PATH" "$PREV_PATH"
            fi
            mv "$STAGING_PATH" "$PUBLISH_PATH"

            echo "------ Start application with PM2 ------"
            start_app
            pm2 status "$APP_NAME"

            echo "------ Verify deployment ------"
            if health_check; then
              rm -rf "$PREV_PATH"
              setup_pm2_startup
              pm2 save
              show_logs
              pm2 status "$APP_NAME"
              echo "Deployment complete — PM2 will restore app after reboot"
            else
              echo "ERROR: Health check failed"
              show_logs
              rollback
              exit 1
            fi
