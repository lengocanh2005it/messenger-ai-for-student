name: Deploy NestJS Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_build:
        description: Force Docker image rebuild (lint, test, build)
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'test/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'package.json'
              - 'package-lock.json'
              - 'nest-cli.json'
              - 'tsconfig*.json'
            deploy:
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/sync-env.yml'
              - '.github/scripts/vps-deploy.sh'

  quality:
    needs: changes
    if: |
      needs.changes.outputs.app == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.force_build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build application
        run: npm run build

  build-image:
    needs: [changes, quality]
    if: |
      always() &&
      !cancelled() &&
      (needs.changes.outputs.app == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.force_build)) &&
      needs.quality.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image: ${{ steps.prep.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image reference
        id: prep
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${REPO_LC}:${{ github.sha }}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${{ env.REGISTRY }}/${REPO_LC}:latest" >> "$GITHUB_ENV"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_LATEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [changes, quality, build-image]
    if: |
      always() &&
      !cancelled() &&
      (needs.changes.outputs.app == 'true' ||
        needs.changes.outputs.deploy == 'true' ||
        github.event_name == 'workflow_dispatch') &&
      (needs.quality.result == 'success' || needs.quality.result == 'skipped') &&
      (needs.build-image.result == 'success' || needs.build-image.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deploy image
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ needs.build-image.result }}" = "success" ]; then
            echo "IMAGE=${{ env.REGISTRY }}/${REPO_LC}:${{ github.sha }}" >> "$GITHUB_ENV"
            echo "DEPLOY_MODE=new-build" >> "$GITHUB_ENV"
          else
            echo "IMAGE=${{ env.REGISTRY }}/${REPO_LC}:latest" >> "$GITHUB_ENV"
            echo "DEPLOY_MODE=reuse-latest" >> "$GITHUB_ENV"
          fi

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Download production env from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "DOPPLER_TOKEN not set — VPS will keep existing .env"
            exit 0
          fi
          doppler secrets download --no-file --format env > production.env
          echo "Downloaded $(wc -l < production.env) lines from Doppler"
          echo "has_production_env=true" >> "$GITHUB_ENV"

      - name: Upload production env to VPS
        if: env.has_production_env == 'true'
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: production.env
          target: /home/ngoc_anh/messenger-bot/
          timeout: 60s

      - name: Upload deploy assets to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml,.github/scripts/vps-deploy.sh
          target: /home/ngoc_anh/messenger-bot/
          timeout: 60s

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.IMAGE }}
          DEPLOY_MODE: ${{ env.DEPLOY_MODE }}
          FORCE_RECREATE: 'false'
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: IMAGE,DEPLOY_MODE,FORCE_RECREATE,GHCR_PULL_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            chmod +x /home/ngoc_anh/messenger-bot/vps-deploy.sh
            bash /home/ngoc_anh/messenger-bot/vps-deploy.sh
