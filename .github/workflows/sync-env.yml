name: Sync production env (no image build)

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  sync-env:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PORT: ${{ vars.VPS_SSH_PORT || '8443' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image (reuse latest)
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=${{ env.REGISTRY }}/${REPO_LC}:latest" >> "$GITHUB_ENV"
          echo "DEPLOY_MODE=reuse-latest" >> "$GITHUB_ENV"

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Download production env from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "DOPPLER_TOKEN not set — VPS will keep existing .env"
            exit 0
          fi
          doppler secrets download --no-file --format env > production.env
          echo "Downloaded $(wc -l < production.env) lines from Doppler"
          echo "has_production_env=true" >> "$GITHUB_ENV"

      - name: Prepare VPS upload bundle
        run: |
          mkdir -p upload-bundle
          cp docker-compose.prod.yml upload-bundle/
          cp .github/scripts/vps-deploy.sh upload-bundle/
          if [ -f production.env ]; then
            cp production.env upload-bundle/
          fi
          ls -la upload-bundle/

      - name: Upload bundle to VPS (retry)
        run: bash .github/scripts/upload-to-vps.sh upload-bundle

      - name: Deploy on VPS (retry)
        env:
          IMAGE: ${{ env.IMAGE }}
          DEPLOY_MODE: ${{ env.DEPLOY_MODE }}
          FORCE_RECREATE: 'true'
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        run: |
          export IMAGE DEPLOY_MODE FORCE_RECREATE GHCR_PULL_TOKEN GHCR_USER
          bash .github/scripts/ssh-deploy-vps.sh /home/ngoc_anh/messenger-bot/vps-deploy.sh
