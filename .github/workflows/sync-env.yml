name: Sync production env (no image build)

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync-env:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger VPS env sync (HTTP)
        env:
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          VPS_PUBLIC_URL: ${{ vars.VPS_PUBLIC_URL }}
        run: bash .github/scripts/trigger-vps-env-sync.sh
