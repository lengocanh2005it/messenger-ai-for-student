services:
  discord-bot:
    image: ${IMAGE:?IMAGE is required}
    container_name: discord-bot
    restart: unless-stopped
    user: '${DEPLOY_UID:?DEPLOY_UID is required}:${DEPLOY_GID:?DEPLOY_GID is required}'
    env_file:
      - .env
    environment:
      HOME: /tmp
    ports:
      - '127.0.0.1:${PORT:-3001}:${PORT:-3001}'
