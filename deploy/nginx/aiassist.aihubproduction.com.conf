# Production reverse proxy for messenger-bot (NestJS on 127.0.0.1:5007).
# Install: deploy/nginx/README.md

server {
    server_name aiassist.aihubproduction.com;

    # Meta webhook + small JSON payloads only
    location = /webhook {
        client_max_body_size 256k;
        limit_req zone=messenger_webhook burst=80 nodelay;

        proxy_pass http://127.0.0.1:5007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        client_max_body_size 1m;

        proxy_pass http://127.0.0.1:5007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/aiassist.aihubproduction.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiassist.aihubproduction.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = aiassist.aihubproduction.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name aiassist.aihubproduction.com;
    return 404;
}
