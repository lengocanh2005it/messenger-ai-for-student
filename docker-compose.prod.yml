services:
  messenger-bot:
    image: ${IMAGE:?IMAGE is required}
    container_name: messenger-bot
    restart: unless-stopped
    user: '${DEPLOY_UID:?DEPLOY_UID is required}:${DEPLOY_GID:?DEPLOY_GID is required}'
    env_file:
      - .env
    environment:
      HOME: /tmp
    ports:
      - '127.0.0.1:${PORT:-5007}:${PORT:-5007}'
    group_add:
      - '${DOCKER_GID:?DOCKER_GID is required}'
    volumes:
      - ./.env:/deploy/.env
      - ./docker-compose.prod.yml:/deploy/docker-compose.prod.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
